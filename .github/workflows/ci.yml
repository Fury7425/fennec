name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-patches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: python3 devutils/validate_patches.py --skip-core

  patch-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: python3 devutils/validate_patches.py --skip-core --status

  typecheck-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd fennec-surfer && npm ci && npm run typecheck

  typecheck-webui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci && npm run typecheck

  validate-mod-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npx ajv-cli compile -s src/mods/mod.schema.json

  validate-surfer-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd fennec-surfer && npm ci && npm run build && node dist/index.js --help

  verify-patches-clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: python3 scripts/verify_clean.py --src patches/vendor/fennec --strict

  zero-requests-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: python3 tests/zero_requests_test.py --dry-run

  validate-domain-regex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: |
          python3 -c "
          import re, sys
          errors = []
          with open('devutils/domain_regex.list') as f:
              for i, line in enumerate(f, 1):
                  line = line.strip()
                  if not line or line.startswith('#'): continue
                  parts = line.split('\t')
                  if len(parts) != 2:
                      errors.append(f'line {i}: expected TAB-separated pattern and replacement')
                      continue
                  try: re.compile(parts[0])
                  except re.error as e: errors.append(f'line {i}: invalid regex: {e}')
          if errors:
              for e in errors: print('FAIL:', e)
              sys.exit(1)
          print('OK - domain_regex.list is valid')
          "
